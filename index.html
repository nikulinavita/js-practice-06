<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Практическая работа №6 — Starter Kit</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== ШАПКА ===== -->
  <header>
    <h1>Практическая работа №6: Работа с DOM</h1>
    <p class="subtitle">Поиск элементов, изменение контента и стилей, создание узлов</p>
  </header>

  <main>

    <!-- ===== СЕКЦИЯ 1: ФОРМА ДОБАВЛЕНИЯ КАРТОЧКИ ===== -->
    <section class="card" id="form-section">
      <h2>Задание 1 — Добавить карточку услуги</h2>

      <div class="form-group">
        <label for="service-name">Название услуги:</label>
        <input
          type="text"
          id="service-name"
          placeholder="Минимум 3 символа..."
          maxlength="60"
        />
      </div>

      <div class="form-group">
        <label for="service-category">Категория:</label>
        <select id="service-category">
          <option value="design">Дизайн</option>
          <option value="dev">Разработка</option>
          <option value="marketing">Маркетинг</option>
        </select>
      </div>

      <div class="buttons">
        <button id="add-btn">Добавить</button>
        <button id="clear-form-btn" class="btn-secondary">Очистить форму</button>
      </div>

      <!-- Сюда JS выводит сообщение об ошибке валидации -->
      <p id="validation-msg" class="validation-msg" aria-live="polite"></p>
    </section>

    <!-- ===== СЕКЦИЯ 2: УПРАВЛЕНИЕ ОТОБРАЖЕНИЕМ ===== -->
    <section class="card" id="controls-section">
      <h2>Задание 2 — Управление стилями</h2>

      <div class="buttons">
        <button id="toggle-theme-btn">🌙 Переключить тему</button>
        <button id="highlight-dev-btn">⭐ Подсветить «Разработку»</button>
        <button id="show-favorites-btn" class="btn-secondary">Показать избранные</button>
        <button id="show-all-btn" class="btn-secondary">Показать все</button>
      </div>
    </section>

    <!-- ===== СЕКЦИЯ 3: КАТАЛОГ КАРТОЧЕК ===== -->
    <section class="card" id="catalog-section">
      <h2>Каталог услуг</h2>

      <p class="counter-line">
        Карточек в каталоге: <span id="total-count">0</span>
      </p>

      <!-- Контейнер для карточек — JS создаёт их здесь -->
      <div id="services-container" aria-live="polite">
        <!-- Карточки появятся здесь -->
      </div>

      <!-- Сообщение «список пуст» — управляется через JS -->
      <p id="empty-msg" class="empty-msg">Карточек пока нет. Добавьте первую!</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
